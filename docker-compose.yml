# Values interpolate from the .env file next to this compose file. Each service
# receives only the variables it reads.

x-logging: &logging
  driver: local
  options:
    max-size: "10m"
    max-file: "1"
    compress: "false"

services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: observer-db
    command: --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${OBSERVER_MONGO_USER:-default}
      MONGO_INITDB_ROOT_PASSWORD: ${OBSERVER_MONGO_PASS:-default}
      # setup.sh creates the app database and collections from these on first init.
      OBSERVER_MONGO_USER: ${OBSERVER_MONGO_USER:-default}
      OBSERVER_MONGO_PASS: ${OBSERVER_MONGO_PASS:-default}
      OBSERVER_MONGO_DB: ${OBSERVER_MONGO_DB:-observer}
      OBSERVER_MONGO_ARTICLES: ${OBSERVER_MONGO_ARTICLES:-articles}
      OBSERVER_MONGO_FEEDS: ${OBSERVER_MONGO_FEEDS:-feeds}
    volumes:
      - "~/.habr_observer:/data/db/"
    restart: unless-stopped
    # interval/timeout/retries tune the HEALTHCHECK test baked into the image.
    healthcheck:
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *logging

  updater:
    build:
      context: ./backend
      dockerfile: build/Dockerfile.updater
    container_name: observer-updater
    environment:
      OBSERVER_MONGO_HOST: ${OBSERVER_MONGO_HOST:-db}
      OBSERVER_MONGO_USER: ${OBSERVER_MONGO_USER:-default}
      OBSERVER_MONGO_PASS: ${OBSERVER_MONGO_PASS:-default}
      OBSERVER_MONGO_DB: ${OBSERVER_MONGO_DB:-observer}
      OBSERVER_MONGO_ARTICLES: ${OBSERVER_MONGO_ARTICLES:-articles}
      OBSERVER_MONGO_FEEDS: ${OBSERVER_MONGO_FEEDS:-feeds}
      OBSERVER_AUTH_TOKEN: ${OBSERVER_AUTH_TOKEN}
      OBSERVER_FEED_UPDATE_INTERVAL: ${OBSERVER_FEED_UPDATE_INTERVAL:-600}
      OBSERVER_FEED_UPDATE_TIMEOUT: ${OBSERVER_FEED_UPDATE_TIMEOUT:-600}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging

  server:
    build:
      context: ./backend
      dockerfile: build/Dockerfile.server
    container_name: observer-server
    environment:
      OBSERVER_MONGO_HOST: ${OBSERVER_MONGO_HOST:-db}
      OBSERVER_MONGO_USER: ${OBSERVER_MONGO_USER:-default}
      OBSERVER_MONGO_PASS: ${OBSERVER_MONGO_PASS:-default}
      OBSERVER_MONGO_DB: ${OBSERVER_MONGO_DB:-observer}
      OBSERVER_MONGO_ARTICLES: ${OBSERVER_MONGO_ARTICLES:-articles}
      OBSERVER_MONGO_FEEDS: ${OBSERVER_MONGO_FEEDS:-feeds}
      OBSERVER_FEED_CACHE_TTL: ${OBSERVER_FEED_CACHE_TTL:-60}
    ports:
      - "${OBSERVER_SERVER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Bakes the Yandex.Metrika counter into the page when set; leave
        # empty for an analytics-free build.
        OBSERVER_METRIKA_ID: ${OBSERVER_METRIKA_ID:-}
    container_name: observer-frontend
    environment:
      # Consumed by nginx's startup envsubst as the /feeds proxy target.
      OBSERVER_BACKEND_URL: ${OBSERVER_BACKEND_URL:-http://server:8080}
    ports:
      # The host port defaults to 8501 on purpose so the external TLS reverse
      # proxy keeps working untouched.
      - "${OBSERVER_WEB_PORT:-8501}:8080"
    # The server image has no shell for a health probe, so this waits only for
    # its start; the frontend tolerates an unready backend by design.
    depends_on:
      - server
    restart: unless-stopped
    # interval/timeout/retries tune the HEALTHCHECK test baked into the image.
    healthcheck:
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging: *logging
